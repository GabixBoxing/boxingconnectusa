<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a1628;color:#fff;font-family:-apple-system,system-ui,sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
button,input,select,textarea{font-family:inherit;-webkit-appearance:none}
button:active{opacity:.8;transform:scale(.97)}
.page{display:none;padding:0 0 82px}.page.active{display:block}
/* HEADER */
#hdr{background:#060e1c;border-bottom:3px solid #FFD700;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:14px;font-weight:900;color:#FFD700;letter-spacing:1px;line-height:1.1}
.hdr-sub{font-size:8px;color:#fff;letter-spacing:2px;font-weight:600;opacity:.8}
.menu-btn{background:#000;border:2px solid #FFD700;color:#FFD700;border-radius:10px;padding:8px 13px;font-size:20px;cursor:pointer;line-height:1}
/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#060e1c;border-top:3px solid #FFD700;display:flex;z-index:50;padding:4px 0 8px}
.nb{flex:1;min-width:0;background:none;border:none;color:#2a3a52;padding:8px 2px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:7px;font-weight:900;cursor:pointer;letter-spacing:.3px}
.nb.on{color:#FFD700}.nbic{font-size:22px;line-height:1}.nbar{width:22px;height:3px;background:#FFD700;border-radius:2px;margin-top:2px}
/* CARDS */
.card{background:#000;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #1a2d4a}
.card-gold{background:#000;border:2px solid #FFD700;border-radius:14px;padding:14px;margin-bottom:10px}
/* INPUTS */
.inp{width:100%;background:#000;border:2px solid #1a2d4a;border-radius:12px;padding:13px 14px;color:#fff;font-size:15px;outline:none}
.inp:focus{border-color:#FFD700}.inp::placeholder{color:#2a3a52}
.sel{width:100%;background:#000;border:2px solid #1a2d4a;border-radius:12px;padding:13px 14px;color:#fff;font-size:15px;outline:none}
.lbl{font-size:11px;color:#4a6a8a;display:block;margin-bottom:6px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}
/* BUTTONS */
.btn-y{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;border-radius:12px;padding:15px;font-weight:900;font-size:15px;width:100%;cursor:pointer}
.btn-b{background:#000;color:#FFD700;border:2px solid #FFD700;border-radius:12px;padding:13px;font-weight:800;font-size:14px;width:100%;cursor:pointer}
.btn-dark{background:#000;color:#fff;border:2px solid #1a2d4a;border-radius:12px;padding:13px;font-weight:700;font-size:14px;width:100%;cursor:pointer}
.btn-g{background:#000;color:#27ae60;border:2px solid #27ae60;border-radius:12px;padding:13px;font-weight:800;font-size:14px;width:100%;cursor:pointer}
.btn-r{background:#000;color:#e74c3c;border:2px solid #e74c3c;border-radius:12px;padding:13px;font-weight:800;font-size:14px;width:100%;cursor:pointer}
/* TAGS */
.tag{background:#000;color:#4a6a8a;border:1px solid #1a2d4a;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.tag-y{background:#000;color:#FFD700;border:1px solid #FFD700;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;display:inline-block;margin:2px}
/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:8px;margin:16px 14px 10px}
.sh-t{font-size:10px;color:#FFD700;font-weight:900;letter-spacing:2px;white-space:nowrap}
.sh-l{flex:1;height:1px;background:linear-gradient(90deg,#1a2d4a,transparent)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,8,20,.95);z-index:100;display:flex;align-items:flex-end}
.modal-box{background:#060e1c;border-radius:24px 24px 0 0;padding:0 16px 20px;width:100%;max-height:92vh;overflow-y:auto;border-top:3px solid #FFD700}
.m-handle{width:36px;height:4px;background:#1a2d4a;border-radius:2px;margin:12px auto 16px}
/* SIDE MENU */
.menu-bg{position:fixed;inset:0;background:rgba(0,8,20,.92);z-index:200;display:none}
.menu-panel{position:fixed;top:0;right:0;bottom:0;width:84%;max-width:340px;background:#060e1c;z-index:201;border-left:3px solid #FFD700;overflow-y:auto;transform:translateX(100%);transition:transform .28s ease}
.menu-panel.open{transform:translateX(0)}
.menu-hdr{background:linear-gradient(135deg,#0d1f3c,#060e1c);padding:40px 16px 16px;border-bottom:2px solid #FFD700}
.menu-gym-av{width:46px;height:46px;border-radius:12px;background:#000;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#FFD700;flex-shrink:0}
.menu-sec{font-size:9px;color:#2a3a52;font-weight:900;letter-spacing:2px;padding:12px 16px 4px}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #0a1628;cursor:pointer}
.menu-item:active{background:#0d1f3c}
.menu-ic{font-size:18px;width:22px;text-align:center}
.menu-txt{font-size:14px;font-weight:600;color:#fff;flex:1}
.menu-arr{color:#2a3a52;font-size:16px}
.menu-badge{background:#FFD700;color:#000;border-radius:8px;padding:2px 8px;font-size:9px;font-weight:900}
.menu-badge-r{background:#e74c3c;color:#fff;border-radius:6px;padding:2px 8px;font-size:9px;font-weight:900}
/* HOME */
.hero{background:linear-gradient(180deg,#0d1f3c,#0a1628);padding:18px 14px;border-bottom:1px solid #1a2d4a;position:relative;overflow:hidden}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:#000;border-bottom:1px solid #1a2d4a}
.stat-cell{padding:14px 8px;text-align:center;border-right:1px solid #1a2d4a}
.stat-cell:last-child{border-right:none}
.stat-n{font-size:30px;font-weight:900;color:#FFD700;line-height:1}
.stat-l{font-size:8px;color:#3a4a5a;font-weight:800;letter-spacing:1px;margin-top:3px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px}
.qa-card{background:#000;border-radius:14px;padding:16px;border:2px solid #1a2d4a;cursor:pointer}
.qa-ic{font-size:28px;margin-bottom:8px}
.qa-t{font-weight:900;font-size:15px;color:#fff}
.qa-s{font-size:11px;color:#3a4a5a;margin-top:3px}
/* SPARRING */
.page-hdr{background:linear-gradient(135deg,#0d1f3c,#0a1628);padding:14px;border-bottom:1px solid #1a2d4a;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:18px;font-weight:900;color:#FFD700}
.page-sub{font-size:11px;color:#3a4a5a;margin-top:2px}
.filter-bar{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid #0a1628;background:#000}
.filter-bar::-webkit-scrollbar{display:none}
.fsel{background:#000;border:2px solid #1a2d4a;border-radius:8px;padding:7px 10px;color:#fff;font-size:12px;outline:none;flex-shrink:0}
.fsel.active{border-color:#FFD700}
.fbtn{flex-shrink:0;background:#000;border:2px solid #1a2d4a;border-radius:8px;padding:7px 12px;color:#4a6a8a;font-size:12px;font-weight:700;cursor:pointer}
.fbtn.on{background:#FFD700;color:#000;border-color:#FFD700}
.sp-card{background:#000;border-radius:14px;margin:0 14px 10px;border:1px solid #1a2d4a;overflow:hidden}
.sp-hdr{padding:12px 14px;border-bottom:1px solid #0a1628;border-left:4px solid #FFD700}
.sp-gym{font-size:17px;font-weight:900;color:#fff}
.sp-meta{font-size:11px;color:#3a4a5a;margin-top:3px}
.sp-date{background:#000;border:2px solid #FFD700;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:800;color:#FFD700;flex-shrink:0}
.sp-body{padding:10px 14px 14px}
.ath-row{display:flex;align-items:center;gap:8px;background:#060e1c;border-radius:8px;padding:8px 10px;margin-bottom:4px;border:1px solid #1a2d4a}
/* ATHLETE */
.ath-card{background:#000;border-radius:14px;padding:12px;margin:0 14px 8px;border:1px solid #1a2d4a;display:flex;align-items:center;gap:12px}
.ath-av{width:50px;height:50px;border-radius:12px;background:#060e1c;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#FFD700;flex-shrink:0}
/* EVENT */
.ev-card{background:#000;border-radius:14px;margin:0 14px 10px;overflow:hidden;border:1px solid #1a2d4a}
.ev-banner{height:80px;background:linear-gradient(135deg,#0d1f3c,#000);display:flex;align-items:center;justify-content:center;font-size:40px;border-bottom:1px solid #1a2d4a}
.ev-body{padding:12px 14px}
.ev-title{font-size:16px;font-weight:900;color:#FFD700}
/* TIMER */
.tm-display{font-size:76px;font-weight:900;text-align:center;letter-spacing:4px;font-variant-numeric:tabular-nums}
.tm-label{text-align:center;font-size:18px;font-weight:900;letter-spacing:3px;padding:6px;border-radius:8px}
/* CONTACT BTNS */
.cbtn{display:inline-flex;align-items:center;gap:4px;background:#000;border:1px solid #1a2d4a;border-radius:8px;padding:8px 11px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;margin:3px}
/* WEIGHT POLICY */
.wp-num{font-size:60px;font-weight:900;color:#FFD700;text-align:center;line-height:1}
.wp-sub{font-size:13px;color:#e74c3c;font-weight:900;text-align:center;margin-top:4px;letter-spacing:1px}
/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px}
.empty-ic{font-size:52px;margin-bottom:12px}
.empty-t{font-size:17px;font-weight:900;color:#FFD700;margin-bottom:6px}
.empty-s{font-size:12px;color:#3a4a5a;margin-bottom:20px}
/* LIVE DOT */
.live{width:7px;height:7px;border-radius:50%;background:#27ae60;display:inline-block;margin-right:4px;box-shadow:0 0 6px #27ae60;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#FFD700;border-radius:2px}
</style>
</head>
<body>

<!-- REGISTRATION SCREEN -->
<div id="reg" style="display:none;min-height:100vh;background:#0a1628"></div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="hdr-logo"></div>
      <div>
        <div class="hdr-title">LV BOXING CONNECT</div>
        <div class="hdr-sub">LA RED DEL BOXEO EN USA</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="fdot" style="width:8px;height:8px;border-radius:50%;background:#1a2d4a"></div>
      <button class="menu-btn" id="menu-open-btn">&#9776;</button>
    </div>
  </div>
  <div id="pg-home" class="page active"></div>
  <div id="pg-sparring" class="page"></div>
  <div id="pg-eventos" class="page"></div>
  <div id="pg-atletas" class="page"></div>
  <nav id="nav"></nav>
</div>

<!-- MODAL -->
<div id="modal"></div>

<!-- SIDE MENU -->
<div class="menu-bg" id="menu-bg"></div>
<div class="menu-panel" id="menu-panel"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
// ── GLOBALS ───────────────────────────────────────────────────────────────
var lng="es", gym=null, fdb=null, online=false, curTab="home";
var allPosts=[], allEvents=[], allAthletes=[], allGyms=[];
var fW="all", fS="all", fST="all", fCT="all";
var regStep=0;
var newsCache=null;
var TM={run:false,work:true,sec:180,round:1,total:3,wSec:180,rSec:60,iv:null};
var yoTab="gym";
var newAths=[];

// ── UTILS ──────────────────────────────────────────────────────────────────
function L(a,b){return lng==="es"?a:b;}
function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ld(k,d){try{var r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function el(id){return document.getElementById(id);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function ago(ts){if(!ts)return"";var m=Math.floor((Date.now()-ts)/60000);if(m<1)return L("ahora","now");if(m<60)return m+"m";var h=Math.floor(m/60);return h<24?h+"h":Math.floor(h/24)+"d";}
function fmtD(d){if(!d)return"--";try{return new Date(d+"T12:00").toLocaleDateString(lng==="es"?"es-US":"en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase();}catch(e){return d;}}
function today(){return new Date().toISOString().split("T")[0];}
function isFut(d){return d&&new Date(d+"T23:59")>=new Date();}
function logo(sz){
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    +'<rect width="100" height="100" rx="18" fill="#111"/>'
    +'<rect x="2" y="2" width="96" height="96" rx="16" fill="none" stroke="#FFD700" stroke-width="2.5"/>'
    +'<text x="50" y="44" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#FFD700" text-anchor="middle" dominant-baseline="middle">LVB</text>'
    +'<rect x="18" y="53" width="64" height="1.5" rx="1" fill="#FFD700" opacity=".4"/>'
    +'<text x="50" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">BOXING</text>'
    +'<text x="50" y="79" font-family="Arial,sans-serif" font-size="6" fill="#4a6a8a" text-anchor="middle" letter-spacing="1">LAS VEGAS</text>'
    +'</svg>';
}
function SH(ic,t){return '<div class="sh"><span>'+ic+'</span><span class="sh-t">'+t+'</span><div class="sh-l"></div></div>';}

// ── FIREBASE ───────────────────────────────────────────────────────────────
function initFB(cfg){
  try{
    if(firebase.apps.length)firebase.apps[0].delete();
    firebase.initializeApp(cfg);fdb=firebase.database();online=true;
    var dot=el("fdot");if(dot)dot.style.cssText="width:8px;height:8px;border-radius:50%;background:#FFD700;box-shadow:0 0 6px #FFD700";
    fdb.ref("posts").orderByChild("createdAt").on("value",function(s){var a=[];s.forEach(function(c){var p=c.val();p.id=c.key;a.unshift(p);});allPosts=a;if(curTab==="home")rHome();else if(curTab==="sparring")rSparring();});
    fdb.ref("events").orderByChild("date").on("value",function(s){var a=[];s.forEach(function(c){var ev=c.val();ev.id=c.key;a.push(ev);});allEvents=a;if(curTab==="home")rHome();else if(curTab==="eventos")rEventos();});
    fdb.ref("athletes").orderByChild("createdAt").on("value",function(s){var a=[];s.forEach(function(c){var at=c.val();at.id=c.key;a.push(at);});allAthletes=a;if(curTab==="atletas")rAtletas();});
    fdb.ref("gyms").on("value",function(s){var a=[];s.forEach(function(c){a.push(c.val());});allGyms=a;});
    return true;
  }catch(e){return false;}
}
function fbPush(path,data,cb){
  if(!fdb){if(cb)cb(false);return;}
  var ref=fdb.ref(path).push();data.id=ref.key;
  ref.set(data,function(e){if(cb)cb(!e);});
}
function fbSet(path,data,cb){if(!fdb){if(cb)cb(false);return;}fdb.ref(path).set(data,function(e){if(cb)cb(!e);});}
function fbDel(path,cb){if(!fdb){if(cb)cb(false);return;}fdb.ref(path).remove(function(e){if(cb)cb(!e);});}

// ── MODAL ──────────────────────────────────────────────────────────────────
function showM(h){
  var closeBar='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:sticky;top:0;background:#060e1c;padding:10px 0 6px;z-index:10;border-bottom:1px solid #1a2d4a">'
    +'<div style="width:36px;height:4px;background:#1a2d4a;border-radius:2px"></div>'
    +'<button onclick="closeM()" style="background:#e74c3c;border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">&#10005;</button>'
    +'</div>';
  el("modal").innerHTML='<div class="modal-bg" id="mbg"><div class="modal-box">'+closeBar+h+'</div></div>';
  el("mbg").onclick=function(e){if(e.target===this)closeM();};
}
function closeM(){el("modal").innerHTML="";}

// ── SIDE MENU ──────────────────────────────────────────────────────────────
function openMenu(){
  var bg=el("menu-bg"),panel=el("menu-panel");
  bg.style.display="block";
  panel.innerHTML=buildMenuHTML();
  setTimeout(function(){panel.classList.add("open");},10);
  bg.onclick=closeMenu;
  // Attach menu events after render
  setTimeout(attachMenuEvents,50);
}
function closeMenu(){
  var bg=el("menu-bg"),panel=el("menu-panel");
  panel.classList.remove("open");
  setTimeout(function(){bg.style.display="none";},300);
}
function menuItem(ic,label,id){
  return '<div class="menu-item" id="mi-'+id+'"><span class="menu-ic">'+ic+'</span><span class="menu-txt">'+label+'</span><span class="menu-arr">&#8250;</span></div>';
}
function buildMenuHTML(){
  var gymName=gym?xe(gym.name):L("Sin gym registrado","No gym registered");
  var coachName=gym?xe(gym.coach):"";
  var h='<div class="menu-hdr">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  h+='<div style="font-size:18px;font-weight:900;color:#FFD700;letter-spacing:1px">LV BOXING CONNECT</div>';
  h+='<button id="menu-close-btn" style="background:#e74c3c;border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:18px;font-weight:900;cursor:pointer">&#10005;</button></div>';
  if(gym){
    h+='<div style="display:flex;align-items:center;gap:12px">';
    h+='<div class="menu-gym-av">'+xe((gym.name||"G")[0].toUpperCase())+'</div>';
    h+='<div><div style="font-weight:800;font-size:15px;color:#fff">'+gymName+'</div>';
    h+='<div style="font-size:11px;color:#4a6a8a;margin-top:2px">'+coachName+'</div></div></div>';
  }
  var connColor=online?"#27ae60":"#e74c3c";
  var connTxt=online?L("Firebase activo","Firebase active"):L("Sin conexion","No connection");
  h+='<div style="display:flex;align-items:center;gap:6px;margin-top:10px"><div style="width:7px;height:7px;border-radius:50%;background:'+connColor+'"></div><span style="font-size:10px;color:'+connColor+';font-weight:700">'+connTxt+'</span></div>';
  h+='</div>';
  // NAVIGATION
  h+='<div class="menu-sec">'+L("NAVEGACION","NAVIGATION")+'</div>';
  h+=menuItem("&#127968;",L("Inicio","Home"),"home");
  h+=menuItem("&#129354;","Sparring","sparring");
  h+=menuItem("&#127942;",L("Eventos","Events"),"eventos");
  h+=menuItem("&#128100;",L("Atletas / Peleadores","Athletes / Fighters"),"atletas");
  // MY GYM
  h+='<div class="menu-sec">'+L("MI GYM","MY GYM")+'</div>';
  h+=menuItem("&#129354;",L("Mi Gym y mis Atletas","My Gym & my Athletes"),"mygym");
  h+=menuItem("&#9201;",L("Cronometro de Sparring","Sparring Timer"),"timer");
  // TOOLS
  h+='<div class="menu-sec">'+L("HERRAMIENTAS","TOOLS")+'</div>';
  h+=menuItem("&#128250;",L("Peleas en Vivo — Amateur y Pro","Live Fights — Amateur & Pro"),"peleas");
  h+=menuItem("&#128722;",L("Tienda de Boxeo — Amazon","Boxing Store — Amazon"),"tienda");
  h+=menuItem("&#128240;",L("Noticias USA Boxing","USA Boxing News"),"news");
  h+=menuItem("&#9878;",L("Tabla de Categorias de Peso","Weight Categories Table"),"pesos");
  h+=menuItem("&#128203;",L("Directorio de Gyms Las Vegas","Las Vegas Gym Directory"),"directorio");
  // RULES
  h+='<div class="menu-sec">'+L("REGLAS OFICIALES","OFFICIAL RULES")+'</div>';
  h+='<div class="menu-item" id="mi-weightpolicy" style="background:#1a0000;border-bottom:1px solid #0a1628">';
  h+='<span class="menu-ic">&#9878;</span>';
  h+='<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#FFD700">'+L("Politica de Pesos","Weight Policy")+'</div>';
  h+='<div style="font-size:10px;color:#e74c3c;font-weight:800;margin-top:1px">'+L("MAX 2-3 LB — NO NEGOCIABLE","MAX 2-3 LB — NON-NEGOTIABLE")+'</div></div>';
  h+='<span class="menu-badge-r">LEY</span></div>';
  h+=menuItem("&#127975;",L("Reglas USA Boxing — Appendix F","USA Boxing Rules — Appendix F"),"usarules");
  h+=menuItem("&#128220;",L("Politica de Privacidad","Privacy Policy"),"privacy");
  // SETTINGS
  h+='<div class="menu-sec">'+L("CONFIGURACION","SETTINGS")+'</div>';
  h+='<div class="menu-item" id="mi-lang"><span class="menu-ic">&#127758;</span><div style="flex:1">';
  h+='<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:8px">'+L("Idioma / Language","Idioma / Language")+'</div>';
  h+='<div style="display:flex;gap:6px">';
  h+='<button id="lang-es" style="flex:1;background:'+(lng==="es"?"#FFD700":"#000")+'";color:'+(lng==="es"?"#000":"#fff")+'";border:2px solid '+(lng==="es"?"#FFD700":"#1a2d4a")+'";border-radius:8px;padding:8px;font-size:12px;font-weight:800;cursor:pointer">&#127464;&#127466; ES</button>';
  h+='<button id="lang-en" style="flex:1;background:'+(lng==="en"?"#FFD700":"#000")+'";color:'+(lng==="en"?"#000":"#fff")+'";border:2px solid '+(lng==="en"?"#FFD700":"#1a2d4a")+'";border-radius:8px;padding:8px;font-size:12px;font-weight:800;cursor:pointer">&#127482;&#127480; EN</button>';
  h+='</div></div></div>';

  h+=menuItem("&#9998;",L("Editar mi Gym","Edit my Gym"),"editgym");
  // ABOUT
  h+='<div style="padding:16px;text-align:center;border-top:1px solid #1a2d4a;margin-top:8px">';
  h+='<div style="font-size:13px;font-weight:900;color:#FFD700;margin-bottom:6px">LV BOXING CONNECT v2.0</div>';
  h+='<div style="font-size:11px;color:#2a3a52;line-height:1.7">'+L("La Red del Boxeo en USA<br>Gabix Boxing<br>Henderson, NV — boxing.vegas","La Red del Boxeo en USA<br>Gabix Boxing<br>Henderson, NV — boxing.vegas")+'</div></div>';
  return h;
}
function attachMenuEvents(){
  var actions={
    home:function(){closeMenu();goTab("home");},
    sparring:function(){closeMenu();goTab("sparring");},
    eventos:function(){closeMenu();goTab("eventos");},
    atletas:function(){closeMenu();goTab("atletas");},
    mygym:function(){closeMenu();showModalPage("mygym");},
    timer:function(){closeMenu();showModalPage("timer");},
    news:function(){closeMenu();showModalPage("news");},
    pesos:function(){closeMenu();showModalPage("pesos");},
    directorio:function(){closeMenu();showModalPage("directorio");},
    tienda:function(){closeMenu();showTienda();},
    peleas:function(){closeMenu();showPeleasEnVivo();},
    weightpolicy:function(){closeMenu();showWeightPolicy();},
    usarules:function(){closeMenu();showUSARules();},
    privacy:function(){closeMenu();showPrivacy();},
    firebase:function(){closeMenu();regStep=1;renderReg();el("reg").style.display="block";el("app").style.display="none";},
    editgym:function(){closeMenu();editGymModal();}
  };
  Object.keys(actions).forEach(function(k){
    var el2=el("mi-"+k);if(el2)el2.onclick=actions[k];
  });
  var mc=el("menu-close-btn");if(mc)mc.onclick=closeMenu;
  var les=el("lang-es");if(les)les.onclick=function(){setLang("es");};
  var len=el("lang-en");if(len)len.onclick=function(){setLang("en");};
}
function setLang(l){lng=l;sv("lv_lang",l);buildNav();goTab(curTab);}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function buildNav(){
  var nav=el("nav");if(!nav)return;nav.innerHTML="";
  var tabs=[
    {id:"home",ic:"&#127968;",es:"INICIO",en:"HOME"},
    {id:"sparring",ic:"&#129354;",es:"SPARRING",en:"SPARRING"},
    {id:"eventos",ic:"&#127942;",es:"EVENTOS",en:"EVENTS"},
    {id:"atletas",ic:"&#128100;",es:"ATLETAS",en:"FIGHTERS"}
  ];
  tabs.forEach(function(t){
    var b=document.createElement("button");
    b.className="nb"+(curTab===t.id?" on":"");
    b.innerHTML='<span class="nbic">'+t.ic+'</span><span>'+(lng==="es"?t.es:t.en)+'</span>'+(curTab===t.id?'<div class="nbar"></div>':"");
    b.onclick=function(){goTab(t.id);};
    nav.appendChild(b);
  });
}
function goTab(t){
  curTab=t;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  var pg=el("pg-"+t);if(pg)pg.classList.add("active");
  buildNav();
  if(t==="home")rHome();
  else if(t==="sparring")rSparring();
  else if(t==="eventos")rEventos();
  else if(t==="atletas")rAtletas();
}

// ── REGISTRATION ────────────────────────────────────────────────────────────
function showReg(){el("reg").style.display="block";el("app").style.display="none";renderReg();}
function renderReg(){
  var h='<div style="background:#0a1628;min-height:100vh">';

  h+='<div style="position:absolute;right:-10px;top:-10px;font-size:150px;opacity:.04">&#129354;</div>';
  h+='<div style="margin-bottom:14px">'+logo(70)+'</div>';
  h+='<div style="font-size:24px;font-weight:900;color:#FFD700;letter-spacing:2px;margin-bottom:4px">LV BOXING CONNECT</div>';
  h+='<div style="font-size:10px;color:#fff;letter-spacing:3px;opacity:.8;margin-bottom:4px">LA RED DEL BOXEO EN USA</div>';
  h+='<div style="font-size:11px;color:#4a6a8a">'+L("La Red Oficial del Boxeo en Las Vegas","The Official Boxing Network of Las Vegas")+'</div></div>';
  h+='<div style="padding:20px">';
  if(regStep===0){
    // Features
    h+='<div class="card" style="margin-bottom:14px">';

      "&#129354; "+L("Publica sparring y conecta con coaches","Post sparring and connect with coaches"),
      "&#127942; "+L("Eventos y torneos en Las Vegas","Events and tournaments in Las Vegas"),
      "&#128100; "+L("Registra tus atletas con su record","Register athletes with their record"),
      "&#128240; "+L("Noticias oficiales USA Boxing","Official USA Boxing news"),
      "&#9201; "+L("Cronometro de sparring con campanas","Sparring timer with bells"),
      "&#9878; "+L("Politica de pesos 2-3 lb estricta","Strict 2-3 lb weight policy")
    ];
    feats.forEach(function(f){h+='<div style="font-size:13px;color:#ccc;padding:6px 0;border-bottom:1px solid #0a1628">'+f+'</div>';});
    h+='</div>';
    h+='<button id="rb1" class="btn-y" style="font-size:17px;padding:18px">'+L("ENTRAR A LV BOXING CONNECT","ENTER LV BOXING CONNECT")+' &#129354;</button>';

  } else if(regStep===4){
    h+='<div style="font-size:22px;font-weight:900;color:#FFD700;margin-bottom:4px;text-align:center">'+L("REGISTRA TU GYM","REGISTER YOUR GYM")+'</div>';
    h+='<div style="font-size:11px;color:#4a6a8a;margin-bottom:16px">'+L("Visible para toda la comunidad de Las Vegas","Visible to the entire Las Vegas community")+'</div>';
    h+='<div style="margin-bottom:10px"><label class="lbl">'+L("NOMBRE DEL GYM *","GYM NAME *")+'</label><input class="inp" id="rg" placeholder="Gabix Boxing"></div>';
    h+='<div style="margin-bottom:10px"><label class="lbl">'+L("NOMBRE DEL COACH *","COACH NAME *")+'</label><input class="inp" id="rc" placeholder="Tu nombre completo"></div>';
    h+='<div style="margin-bottom:10px"><label class="lbl">'+L("CIUDAD","CITY")+'</label><input class="inp" id="rci" value="Las Vegas, NV"></div>';
    h+='<div style="margin-bottom:10px"><label class="lbl">'+L("TELEFONO *","PHONE *")+'</label><input class="inp" id="rp" type="tel" placeholder="702-xxx-xxxx"></div>';
    h+='<div style="margin-bottom:16px"><label class="lbl">EMAIL ('+L("opcional","optional")+')</label><input class="inp" id="re" type="email" placeholder="contact@gabixboxing.com"></div>';
    h+='<button id="rb8" class="btn-y">'+L("UNIRME A LV BOXING CONNECT","JOIN LV BOXING CONNECT")+' &#129354;</button>';
    h+='<div id="rmsg" style="text-align:center;font-size:12px;margin-top:8px;color:#e74c3c;min-height:16px"></div>';
  }
  h+='</div></div>';
  el("reg").innerHTML=h;
  var evts={rb1:function(){regStep=4;renderReg();},rb8:doRegGym};
  Object.keys(evts).forEach(function(id){var e=el(id);if(e)e.onclick=evts[id];});

  if(pg.querySelector("#usa-events-section"))return;
  var sec=document.createElement("div");
  sec.id="usa-events-section";
  sec.innerHTML=SH("&#127975;","USA BOXING — "+L("EVENTOS OFICIALES","OFFICIAL EVENTS"))
    +'<div style="padding:0 14px 14px">'
    +'<div id="usa-ev-content" style="color:#FFD700;font-size:12px;text-align:center;padding:10px">'+L("Cargando eventos oficiales...","Loading official events...")+'</div></div>';
  pg.appendChild(sec);
  var proxies=["https://corsproxy.io/?"+encodeURIComponent(RSS),"https://api.allorigins.win/raw?url="+encodeURIComponent(RSS)];
  function tryP(i){
    if(i>=proxies.length){
      var cont=el("usa-ev-content");
      if(cont)cont.innerHTML='<div style="color:#3a4a5a;font-size:12px;text-align:center">'+L("Sin eventos disponibles ahora","No events available now")+'</div>';
      return;
    }
    fetch(proxies[i]).then(function(r){return r.text();}).then(function(xml){
      var items=parseRSS(xml);
      var evItems=items.filter(function(it){
        var t=it.title.toLowerCase();
        return t.indexOf("tournament")>=0||t.indexOf("torneo")>=0||t.indexOf("championship")>=0||t.indexOf("open")>=0||t.indexOf("camp")>=0||t.indexOf("event")>=0||t.indexOf("bout")>=0||t.indexOf("fight")>=0||t.indexOf("olympic")>=0||t.indexOf("national")>=0;
      });
      if(!evItems.length)evItems=items.slice(0,4);
      var cont=el("usa-ev-content");if(!cont)return;
      var h="";
      evItems.slice(0,5).forEach(function(item){
        h+='<div style="background:#000;border-radius:14px;margin-bottom:10px;border:1px solid #1a2d4a;border-left:3px solid #FFD700;overflow:hidden">';
        if(item.img)h+='<img src="'+xe(item.img)+'" style="width:100%;height:120px;object-fit:cover">';
        h+='<div style="padding:12px">';
        h+='<div style="font-size:10px;color:#FFD700;font-weight:700;margin-bottom:5px">'+xe(item.date)+' &bull; USA BOXING</div>';
        h+='<div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:5px;line-height:1.3">'+xe(item.title)+'</div>';
        if(item.desc)h+='<div style="font-size:11px;color:#6a8aaa;line-height:1.5;margin-bottom:10px">'+xe(item.desc)+'...</div>';
        h+='<button class="usa-ev-link btn-y" data-url="'+xe(item.link)+'" style="padding:9px;font-size:12px">'+L("VER EVENTO COMPLETO","VIEW FULL EVENT")+' &#8599;</button>';
        h+='</div></div>';
      });
      cont.innerHTML=h;
      cont.querySelectorAll(".usa-ev-link").forEach(function(b){
        b.onclick=function(){var u=this.dataset.url;if(u)window.open(u,"_blank");};
      });
    }).catch(function(){tryP(i+1);});
  }
  tryP(0);
}

function tFmt(s){var m=Math.floor(s/60),sc=s%60;return(m<10?"0":"")+m+":"+(sc<10?"0":"")+sc;}
var _audioCtx=null;
function getACtx(){
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==="suspended")_audioCtx.resume();
    return _audioCtx;
  }catch(e){return null;}
}
// Init audio on first touch anywhere
document.addEventListener("touchstart",function(){getACtx();},{once:true,passive:true});
document.addEventListener("click",function(){getACtx();},{once:true});

function tBell(n){
  try{
    var ctx=getACtx();if(!ctx)return;
    for(var i=0;i<n;i++){
      (function(d){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=720;
        g.gain.setValueAtTime(0,ctx.currentTime+d);
        g.gain.linearRampToValueAtTime(0.9,ctx.currentTime+d+.01);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+1.5);
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+2);
        // Second harmonic for richer bell sound
        var o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.value=1440;
        g2.gain.setValueAtTime(0,ctx.currentTime+d);
        g2.gain.linearRampToValueAtTime(0.3,ctx.currentTime+d+.01);
        g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+0.8);
        o2.start(ctx.currentTime+d);o2.stop(ctx.currentTime+d+1);
      })(i*0.6);
    }
  }catch(e){}
}
function tUpd(){
  var area=el("tm-area");if(!area)return;
  area.style.background=TM.work?"#1a0000":"#001a0a";
  var disp=el("tm-disp");if(disp){disp.className="tm-display";disp.style.color=TM.work?"#ff4444":"#44ff88";disp.textContent=tFmt(TM.sec);}
  var stat=el("tm-stat");if(stat){stat.className="tm-label";stat.style.cssText="text-align:center;font-size:18px;font-weight:900;letter-spacing:3px;padding:6px;border-radius:8px;color:"+(TM.work?"#ff4444":"#44ff88");stat.textContent=TM.work?L("TRABAJO","WORK"):L("DESCANSO","REST");}
  var rnd=el("tm-rnd");if(rnd)rnd.textContent=L("Asalto","Round")+" "+TM.round+" "+L("de","of")+" "+TM.total;
  var sbtn=el("tm-start-btn");if(sbtn)sbtn.textContent=TM.run?L("PAUSAR","PAUSE"):L("INICIAR","START");
  var rc=el("tm-rc");if(rc)rc.textContent=TM.total;
}
function tStartStop(){
  if(TM.run){clearInterval(TM.iv);TM.run=false;}
  else{
    if(TM.sec===0){TM.work=true;TM.sec=TM.wSec;}
    TM.run=true;
    TM.iv=setInterval(function(){
      if(TM.sec>0){TM.sec--;}
      else{
        if(TM.work){
          if(TM.round>=TM.total){clearInterval(TM.iv);TM.run=false;TM.sec=0;tBell(3);tUpd();return;}
          TM.work=false;TM.sec=TM.rSec;tBell(1);
        }else{TM.round++;TM.work=true;TM.sec=TM.wSec;tBell(2);}
      }
      tUpd();
    },1000);
  }
  tUpd();
}
function tReset(){clearInterval(TM.iv);TM.run=false;TM.work=true;TM.round=1;TM.sec=TM.wSec;tUpd();}
function tSetMode(w,r){TM.wSec=Math.round(w*60);TM.rSec=Math.round(r*60);tReset();}
function tAdj(d){TM.total=Math.max(1,Math.min(12,TM.total+d));tUpd();}

var RSS="https://rss.app/feeds/IXCBLERcgy93hqDn.xml";
function loadNews(wrap){
  if(!wrap)return;
  if(newsCache){displayNews(wrap,newsCache);return;}
  var proxies=["https://corsproxy.io/?"+encodeURIComponent(RSS),"https://api.allorigins.win/raw?url="+encodeURIComponent(RSS)];
  function tryP(i){
    if(i>=proxies.length){wrap.innerHTML='<div style="text-align:center;padding:20px;color:#e74c3c">'+L("Sin conexion a internet","No internet connection")+'</div>';return;}
    fetch(proxies[i]).then(function(r){return r.text();}).then(function(xml){
      var items=parseRSS(xml);
      if(!items.length){tryP(i+1);return;}
      newsCache=items;displayNews(wrap,items);
    }).catch(function(){tryP(i+1);});
  }
  tryP(0);
}
function parseRSS(xml){
  try{
    var doc=new DOMParser().parseFromString(xml,"text/xml");
    var result=[];
    doc.querySelectorAll("item").forEach(function(item){
      var title=(item.querySelector("title")||{}).textContent||"";
      var link=(item.querySelector("link")||{}).textContent||"";
      var desc=(item.querySelector("description")||{}).textContent||"";
      var date=(item.querySelector("pubDate")||{}).textContent||"";
      var enc=item.querySelector("enclosure");var img=enc?enc.getAttribute("url"):"";
      var div=document.createElement("div");div.innerHTML=desc;
      var clean=(div.textContent||"").trim().slice(0,150);
      var fd="--";try{fd=new Date(date).toLocaleDateString(lng==="es"?"es-US":"en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){}
      if(title&&link&&title.indexOf("Latest Boxing News")!==0)result.push({title:title.trim(),link:link.trim(),desc:clean,date:fd,img:img});
    });
    return result;
  }catch(e){return [];}
}

        body:body,
        icon:"./icon-192.png",
        badge:"./icon-192.png",
        tag:tag||"lvboxing",
        vibrate:[200,100,200]
      });
    }catch(e){}
  }
}

function loadLiveEventsHTML(){

  if(!fdb)return'<div style="text-align:center;font-size:12px;color:#3a4a5a;padding:8px">'+L("Sin transmisiones en vivo ahora. Se el primero en publicar.","No live streams now. Be the first to post.")+'</div>';

  fdb.ref("liveEvents").orderByChild("createdAt").limitToLast(10).once("value",function(snap){
    var events=[];snap.forEach(function(c){events.push(c.val());});
    var cont=document.getElementById("live-events-list");if(!cont)return;

      h+='<span style="font-size:9px;color:#e74c3c;font-weight:900">LIVE</span></div></div>';
      h+='<button class="watch-live-btn btn-r" data-url="'+xe(ev.url)+'" style="padding:8px;font-size:12px;margin-top:8px">&#9654; '+L("VER EN VIVO","WATCH LIVE")+'</button>';
      h+='</div>';
    });
    cont.innerHTML=h;
    cont.querySelectorAll(".watch-live-btn").forEach(function(b){

  });
  return'<div style="text-align:center;font-size:12px;color:#4a6a8a;padding:8px">'+L("Cargando...","Loading...")+'</div>';

function buildPostCard(p){
  var myLike = gym && p.likes && p.likes[gym.id];
  var likeCount = p.likesCount || 0;
  var commentCount = p.commentCount || 0;
  var h = '<div class="post-card" style="background:#000;border-radius:16px;margin-bottom:12px;overflow:hidden;border:1px solid #1a2d4a">';
  
  // Header
  h += '<div style="display:flex;align-items:center;gap:10px;padding:12px">';
  h += '<div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#1a3a6a,#000);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#FFD700;flex-shrink:0">';
  h += xe((p.gymName||"G").charAt(0).toUpperCase())+'</div>';
  h += '<div style="flex:1"><div style="font-weight:800;color:#fff;font-size:14px">'+xe(p.gymName)+'</div>';
  h += '<div style="font-size:10px;color:#3a4a5a">'+xe(p.coach)+' &bull; '+ago(p.createdAt)+'</div></div>';
  if(p.state) h += '<div style="font-size:10px;color:#FFD700;font-weight:700">&#128205; '+xe(p.state)+'</div>';
  h += '</div>';

  // Photo
  if(p.photo){
    h += '<img src="'+p.photo+'" style="width:100%;max-height:400px;object-fit:cover">';
  }

  // Video link
  if(p.videoUrl){
    var vThumb = getVideoThumb(p.videoUrl);
    h += '<div style="position:relative;cursor:pointer" class="post-video-btn" data-url="'+xe(p.videoUrl)+'">';
    if(vThumb){
      h += '<img src="'+vThumb+'" style="width:100%;height:200px;object-fit:cover">';
    } else {
      h += '<div style="background:#1a0000;height:120px;display:flex;align-items:center;justify-content:center">';
      h += '<div style="font-size:48px">&#9654;</div></div>';
    }
    h += '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:22px">&#9654;</div></div>';
  }

  // Text
  if(p.text){
    h += '<div style="padding:12px;font-size:14px;color:#ddd;line-height:1.5">'+xe(p.text)+'</div>';
  }

  // Actions bar
  h += '<div style="display:flex;align-items:center;gap:0;border-top:1px solid #1a2d4a;padding:4px 8px">';
  
  // Like
  h += '<button class="like-btn" data-id="'+xe(p.id)+'" style="background:none;border:none;cursor:pointer;padding:10px 14px;display:flex;align-items:center;gap:6px;color:'+(myLike?"#e74c3c":"#4a6a8a")+';font-size:13px;font-weight:700">';
  h += (myLike?'&#10084;':'&#9825;')+' '+likeCount+'</button>';
  
  // Comment
  h += '<button class="comment-btn" data-id="'+xe(p.id)+'" style="background:none;border:none;cursor:pointer;padding:10px 14px;display:flex;align-items:center;gap:6px;color:#4a6a8a;font-size:13px;font-weight:700">';
  h += '&#128172; '+commentCount+'</button>';
  
  // Share
  h += '<button onclick="sharePost(\''+xe(p.id)+'\')" style="background:none;border:none;cursor:pointer;padding:10px 14px;color:#4a6a8a;font-size:13px">&#128257;</button>';
  
  // Delete (own posts)
  if(gym && p.gymId === gym.id){
    h += '<button onclick="confirmDel(\'communityPosts/'+xe(p.id)+'\')" style="background:none;border:none;cursor:pointer;padding:10px 14px;color:#e74c3c;font-size:13px;margin-left:auto">&#128465;</button>';
  }
  h += '</div></div>';
  return h;
}

function getVideoThumb(url){
  var ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/))([a-zA-Z0-9_-]{11})/);
  if(ytMatch) return "https://img.youtube.com/vi/"+ytMatch[1]+"/mqdefault.jpg";
  return null;
}

function toggleLike(postId){
  if(!gym){showM('<div style="font-size:16px;font-weight:900;color:#FFD700;margin-bottom:12px">'+L("Registra tu gym para dar like","Register your gym to like")+'</div><button class="btn-y" onclick="closeM()">OK</button>');return;}
  if(!fdb) return;
  var postRef = fdb.ref("communityPosts/"+postId);
  postRef.once("value", function(snap){
    var p = snap.val(); if(!p) return;
    var likes = p.likes || {};
    var count = p.likesCount || 0;
    if(likes[gym.id]){
      delete likes[gym.id]; count = Math.max(0, count-1);
    } else {
      likes[gym.id] = true; count++;
    }
    postRef.update({likes:likes, likesCount:count});
  });
}

function showComments(postId){
  if(!fdb) return;
  fdb.ref("communityPosts/"+postId+"/comments").once("value", function(snap){
    var comments = [];
    snap.forEach(function(c){ comments.push(c.val()); });
    var h = '<div style="font-size:17px;font-weight:900;color:#FFD700;margin-bottom:14px">&#128172; '+L("Comentarios","Comments")+'</div>';
    if(!comments.length){
      h += '<div style="color:#3a4a5a;font-size:13px;text-align:center;padding:20px">'+L("Sin comentarios aun. Se el primero!","No comments yet. Be first!")+'</div>';
    } else {
      comments.forEach(function(cm){
        h += '<div style="background:#000;border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid #FFD700">';
        h += '<div style="font-weight:700;color:#FFD700;font-size:12px">'+xe(cm.gymName)+'</div>';
        h += '<div style="color:#ddd;font-size:13px;margin-top:4px">'+xe(cm.text)+'</div>';
        h += '<div style="color:#3a4a5a;font-size:10px;margin-top:4px">'+ago(cm.createdAt)+'</div></div>';
      });
    }
    if(gym){
      h += '<div style="margin-top:12px"><textarea class="inp" id="new-comment" placeholder="'+L("Escribe un comentario...","Write a comment...")+'" style="height:70px;resize:none"></textarea>';
      h += '<button id="submit-comment-btn" class="btn-y" style="margin-top:8px;padding:12px">'+L("COMENTAR","COMMENT")+'</button></div>';
    }
    showM(h);
    var scb = el("submit-comment-btn");
    if(scb) scb.onclick = function(){
      var nc = el("new-comment");
      if(!nc||!nc.value.trim()) return;
      var cm = {gymId:gym.id,gymName:gym.name,coach:gym.coach,text:nc.value.trim(),createdAt:Date.now()};
      fdb.ref("communityPosts/"+postId+"/comments").push(cm);
      fdb.ref("communityPosts/"+postId).once("value",function(s){
        var cnt=(s.val()&&s.val().commentCount)||0;
        fdb.ref("communityPosts/"+postId).update({commentCount:cnt+1});
      });
      closeM();
    };
  });
}

function sharePost(postId){
  var url = window.location.href.split("?")[0]+"?post="+postId;
  if(navigator.share){navigator.share({title:"Boxing Connect USA",url:url});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url);alert(L("Link copiado!","Link copied!"));}
}

function showPostComposer(){
  if(!gym){showM('<div style="font-size:16px;font-weight:900;color:#FFD700;margin-bottom:12px">'+L("Registra tu gym primero","Register your gym first")+'</div><button class="btn-y" onclick="closeM()">OK</button>');return;}
  var _postPhoto = null;
  var h = '<div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:14px">&#128247; '+L("NUEVA PUBLICACION","NEW POST")+'</div>';
  
  // Preview
  h += '<div id="post-photo-preview" style="width:100%;height:180px;background:#111;border-radius:12px;border:2px dashed #1a2d4a;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden">';
  h += '<div style="text-align:center;color:#3a4a5a"><div style="font-size:36px">&#128247;</div><div style="font-size:12px">'+L("Foto o video","Photo or video")+'</div></div></div>';
  
  // File input
  h += '<div style="display:flex;gap:8px;margin-bottom:10px">';
  h += '<label style="flex:1;background:#000;border:2px solid #FFD700;color:#FFD700;border-radius:10px;padding:10px;font-weight:700;font-size:12px;cursor:pointer;text-align:center">&#128247; '+L("FOTO","PHOTO")+'<input type="file" id="post-photo-input" accept="image/*" style="display:none" capture="environment"></label>';
  h += '<label style="flex:1;background:#000;border:2px solid #e74c3c;color:#e74c3c;border-radius:10px;padding:10px;font-weight:700;font-size:12px;cursor:pointer;text-align:center">&#127916; '+L("VIDEO","VIDEO")+'<input type="file" id="post-video-input" accept="video/*" style="display:none"></label>';
  h += '</div>';
  
  // Video URL
  h += '<div style="margin-bottom:10px"><input class="inp" id="post-video-url" placeholder="'+L("O pega link YouTube/TikTok/Instagram","Or paste YouTube/TikTok/Instagram link")+'" style="font-size:12px"></div>';
  
  // Text
  h += '<textarea class="inp" id="post-text" placeholder="'+L("Que esta pasando en tu gym?","What\'s happening at your gym?")+'" style="height:80px;resize:none;margin-bottom:10px"></textarea>';
  
  h += '<button id="submit-post-btn" class="btn-y" style="padding:14px;font-size:14px">'+L("PUBLICAR","POST")+'</button>';
  h += '<div id="post-msg" style="text-align:center;font-size:12px;margin-top:8px;min-height:16px"></div>';
  
  showM(h);
  
  // Photo handler
  setTimeout(function(){
    var ppi = el("post-photo-input");
    if(ppi) ppi.onchange = function(){
      var file = this.files[0]; if(!file) return;
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var canvas = document.createElement("canvas");
          var MAX = 800;
          var w = img.width, h2 = img.height;
          if(w>h2){if(w>MAX){h2=h2*(MAX/w);w=MAX;}}else{if(h2>MAX){w=w*(MAX/h2);h2=MAX;}}
          canvas.width=w; canvas.height=h2;
          canvas.getContext("2d").drawImage(img,0,0,w,h2);
          _postPhoto = canvas.toDataURL("image/jpeg",0.75);
          var prev = el("post-photo-preview");
          if(prev) prev.innerHTML='<img src="'+_postPhoto+'" style="width:100%;height:100%;object-fit:cover">';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    
    // Video file handler (compress message)
    var pvi = el("post-video-input");
    if(pvi) pvi.onchange = function(){
      var file = this.files[0]; if(!file) return;
      if(file.size > 15*1024*1024){
        var pm = el("post-msg");
        if(pm) pm.innerHTML='<span style="color:#e74c3c">'+L("Video muy grande. Max 15MB o usa link de YouTube","Video too large. Max 15MB or use YouTube link")+'</span>';
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e){
        _postPhoto = null;
        var prev = el("post-photo-preview");
        if(prev) prev.innerHTML='<video src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover" controls></video>';
        // Store video data
        el("post-video-url").value = e.target.result;
      };
      reader.readAsDataURL(file);
    };
    
    // Submit
    var spb = el("submit-post-btn");
    if(spb) spb.onclick = function(){
      var msg = el("post-msg");
      var text = el("post-text"), vurl = el("post-video-url");
      if(!_postPhoto && (!vurl||!vurl.value.trim()) && (!text||!text.value.trim())){
        if(msg) msg.innerHTML='<span style="color:#e74c3c">'+L("Agrega foto, video o texto","Add photo, video or text")+'</span>';
        return;
      }
      if(msg) msg.innerHTML='<span style="color:#FFD700">'+L("Publicando...","Posting...")+'</span>';
      var post = {
        gymId:gym.id, gymName:gym.name, coach:gym.coach,
        state: gym.state || "", country: gym.country || "USA",
        text: text?text.value.trim():"",
        photo: _postPhoto||null,
        videoUrl: (vurl&&vurl.value.trim())?vurl.value.trim():null,
        likesCount:0, commentCount:0, likes:{},
        createdAt:Date.now()
      };
      fbPush("communityPosts", post, function(ok){
        if(ok){ _postPhoto=null; closeM(); }
        else if(msg) msg.innerHTML='<span style="color:#e74c3c">Error</span>';
      });
    };
  }, 100);
}

function loadComunidadPosts(){
  if(!fdb) return;
  fdb.ref("communityPosts").orderByChild("createdAt").limitToLast(50).on("value", function(snap){
    comunidadPosts = [];
    snap.forEach(function(c){ 
      var p = c.val();
      p.id = c.key;
      comunidadPosts.push(p);
    });
    if(el("pg-comunidad")) rComunidad();
    // Update home stats
    var cc = el("community-count");
    if(cc) cc.textContent = comunidadPosts.length;
  });
}

function getCountryStates(country){
  return COUNTRIES[country] || COUNTRIES["USA"];
}

function updateRegStates(){
  var ct = el("rct"); if(!ct) return;
  var rst = el("rst"); if(!rst) return;
  var states = getCountryStates(ct.value);
  var defState = ct.value==="USA"?"Nevada":states[0];
  rst.innerHTML = states.map(function(s){
    return '<option value="'+s+'"'+(s===defState?" selected":"")+'>'+s+'</option>';
  }).join("");
}
