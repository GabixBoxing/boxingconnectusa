// ── UTILS ─────────────────────────────────────────────────────────────────
function el(id){ return document.getElementById(id); }
function xe(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function L(es,en){ return lng==="es"?es:en; }
function sv(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function ld(k,d){ try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,6); }
function ago(ts){
  if(!ts)return"";
  var d=(Date.now()-ts)/1000;
  if(d<60)return L("ahora","now");
  if(d<3600)return Math.floor(d/60)+"m";
  if(d<86400)return Math.floor(d/3600)+"h";
  return Math.floor(d/86400)+"d";
}

function myId(){ return gym?gym.id:(athlete?athlete.id:null); }
function isOwner(postUserId){ return myId()&&(postUserId===myId()); }

// ── SOUND ─────────────────────────────────────────────────────────────────
function playBell(n){
  if(!soundEnabled)return;
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    for(var i=0;i<(n||1);i++){
      (function(d){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.value=880;
        g.gain.setValueAtTime(0,ctx.currentTime+d);
        g.gain.linearRampToValueAtTime(0.5,ctx.currentTime+d+.02);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+1.0);
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+1.2);
      })(i*0.5);
    }
  }catch(e){}
}

function playNotifSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var freqs=[660,880,1100];
    freqs.forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
      g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.12+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*0.12+0.4);
      o.start(ctx.currentTime+i*0.12);
      o.stop(ctx.currentTime+i*0.12+0.5);
    });
  }catch(e){}
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
function showToast(msg, tab){
  var bar=el("notif-bar");if(!bar)return;
  var d=document.createElement("div");
  d.className="notif-toast";
  d.innerHTML='<span style="font-size:20px">🥊</span><div style="flex:1"><div>'+xe(msg)+'</div></div>'
    +(tab?'<button onclick="goPage(\''+tab+'\');this.parentElement.remove()" style="background:#000;border:none;color:#FFD700;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:900;cursor:pointer">VER</button>':'');
  bar.appendChild(d);
  setTimeout(function(){ try{d.remove();}catch(e){} },4000);
  playNotifSound();
  // System notification if allowed
  if(window.Notification&&Notification.permission==="granted"){
    try{ new Notification("Boxing Connect USA",{body:msg,icon:"https://i.imgur.com/placeholder.png"}); }catch(e){}
  }
}

function requestNotifPermission(){
  if(window.Notification&&Notification.permission==="default"){
    Notification.requestPermission();
  }
}

function addBadge(tab, n){
  notifBadges[tab]=(notifBadges[tab]||0)+(n||1);

}
function clearBadge(tab){
  notifBadges[tab]=0;
  buildNav();
}

// ── FIREBASE ──────────────────────────────────────────────────────────────
function initFB(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
    fdb=firebase.database();
    // Connection state
    fdb.ref(".info/connected").on("value",function(s){
      var dot=el("conn-dot"),lbl=el("conn-lbl");
      if(s.val()===true){
        if(dot)dot.style.background="#27ae60";
        if(lbl){lbl.textContent="LIVE";lbl.style.color="#27ae60";}
      } else {
        if(dot)dot.style.background="#e74c3c";
        if(lbl){lbl.textContent="OFF";lbl.style.color="#e74c3c";}
      }
    });
    loadData();
    return true;
  }catch(e){ return false; }
}

function fbPush(path,data,cb){
  if(!fdb){if(cb)cb(false);return;}
  fdb.ref(path).push(data).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});
}
function fbSet(path,data,cb){
  if(!fdb){if(cb)cb(false);return;}
  fdb.ref(path).set(data).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});
}
function fbUpdate(path,data,cb){
  if(!fdb){if(cb)cb(false);return;}
  fdb.ref(path).update(data).then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});
}
function fbRemove(path,cb){
  if(!fdb){if(cb)cb(false);return;}
  fdb.ref(path).remove().then(function(){if(cb)cb(true);}).catch(function(){if(cb)cb(false);});
}

var _firstLoad = {posts:true, events:true, feed:true};

function loadData(){
  if(!fdb)return;
  // Gyms
  fdb.ref("gyms").on("value",function(s){
    var n=0;s.forEach(function(){n++;});
    var e=el("stat-gyms");if(e)e.textContent=n;
  });
  // Athletes
  fdb.ref("athletes").on("value",function(s){
    allAthletes=[];
    s.forEach(function(c){var v=c.val();v.id=c.key;allAthletes.push(v);});
    var e=el("stat-athletes");if(e)e.textContent=allAthletes.length;
    if(curPage==="atletas")renderAthletes();
  });
  // Sparring posts — detect new
  fdb.ref("posts").orderByChild("createdAt").limitToLast(50).on("value",function(s){
    var prev=allPosts.length;
    allPosts=[];
    s.forEach(function(c){var v=c.val();v.id=c.key;allPosts.push(v);});
    allPosts.reverse();
    var e=el("stat-posts");if(e)e.textContent=allPosts.length;
    if(!_firstLoad.posts&&allPosts.length>prev){
      var newest=allPosts[0];
      if(curPage!=="sparring"){
        addBadge("sparring",allPosts.length-prev);
        showToast(L("Nuevo sparring de ","New sparring from ")+(newest.gymName||"?")+" 🥊","sparring");
      }
    }
    _firstLoad.posts=false;
    if(curPage==="sparring")renderSparring();
  });
  // Events
  fdb.ref("events").orderByChild("date").on("value",function(s){
    var prev=allEvents.length;
    allEvents=[];
    s.forEach(function(c){var v=c.val();v.id=c.key;allEvents.push(v);});
    if(!_firstLoad.events&&allEvents.length>prev){
      if(curPage!=="eventos"){
        addBadge("eventos",allEvents.length-prev);
        showToast(L("Nuevo evento publicado","New event posted")+" 🏆","eventos");
      }
    }
    _firstLoad.events=false;
    if(curPage==="eventos")renderEventos();
  });
  // Feed
  fdb.ref("communityPosts").orderByChild("createdAt").limitToLast(50).on("value",function(s){
    var prev=allFeedPosts.length;
    allFeedPosts=[];
    s.forEach(function(c){var v=c.val();v.id=c.key;allFeedPosts.push(v);});
    allFeedPosts.reverse();
    if(!_firstLoad.feed&&allFeedPosts.length>prev){
      var newest=allFeedPosts[0];
      if(curPage!=="feed"){
        addBadge("feed",allFeedPosts.length-prev);
        showToast(L("Nueva publicación de ","New post from ")+(newest.gymName||"?")+" 📸","feed");
      }
    }
    _firstLoad.feed=false;
    if(curPage==="feed")renderFeed();
  });
}

// ── NAV ───────────────────────────────────────────────────────────────────
function buildNav(){
  var tabs=[
    {id:"inicio",ico:"🏠",label:"INICIO"},
    {id:"sparring",ico:"🥊",label:"SPARRING"},
    {id:"eventos",ico:"🏆",label:"EVENTOS"},
    {id:"atletas",ico:"👤",label:"ATLETAS"},
    {id:"feed",ico:"🌍",label:"FEED"}
  ];
  var tabBadge={sparring:"sparring",eventos:"eventos",feed:"feed"};
  var h="";
  tabs.forEach(function(t){
    var b=tabBadge[t.id]?notifBadges[tabBadge[t.id]]:0;
    h+='<button class="nb'+(curPage===t.id?" on":"")
      +'" onclick="goPage(\''+t.id+'\')">'
      +'<span class="ico">'+t.ico+'</span>'+t.label
      +(b>0?'<span class="badge">'+b+'</span>':'')
      +'</button>';
  });
  el("nav").innerHTML=h;
}

function goPage(p){
  curPage=p;
  document.querySelectorAll(".pg").forEach(function(e){e.classList.remove("act");});
  var pg=el("pg-"+p);if(pg)pg.classList.add("act");
  // Clear badge when opening that tab
  if(notifBadges[p]>0){clearBadge(p);}
  buildNav();
  if(p==="sparring")renderSparring();
  if(p==="eventos")renderEventos();
  if(p==="atletas")renderAthletes();
  if(p==="feed")renderFeed();
  if(p==="inicio")renderHome();
}

// ── HOME ──────────────────────────────────────────────────────────────────
function renderHome(){
  var user=gym||athlete;
  if(user){
    var nm=el("home-name"),sb=el("home-sub");
    if(nm)nm.textContent=(gym?"🏋️ ":"👤 ")+(gym?gym.name:athlete.name);
    if(sb)sb.textContent=gym?(gym.city||""):((athlete.weight||"")+"lb • "+(athlete.country||""));
  }
  loadNews();
}

function loadNews(){
  var cont=el("home-news");if(!cont)return;
  var RSS="https://rss.app/feeds/IXCBLERcgy93hqDn.xml";
  fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(RSS))
    .then(function(r){return r.text();}).then(function(xml){
      var items=[];
      var matches=xml.match(/<item>[\s\S]*?<\/item>/g)||[];
      matches.slice(0,3).forEach(function(item){
        var t=(item.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||item.match(/<title>(.*?)<\/title>/))||[];
        var l=(item.match(/<link>(.*?)<\/link>/))||[];
        var d=(item.match(/<pubDate>(.*?)<\/pubDate>/))||[];
        if(t[1])items.push({title:t[1],link:l[1]||"#",date:d[1]||""});
      });
      var h='<div class="sec-hdr" style="padding:0 0 8px">📰 USA BOXING NEWS</div>';
      items.forEach(function(item){
        h+='<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="window.open(\''+xe(item.link)+'\',\'_blank\')">';
        h+='<div style="font-size:10px;color:#FFD700;margin-bottom:4px">'+xe(item.date.substr(0,16))+'</div>';
        h+='<div style="font-size:13px;font-weight:700;color:#fff;line-height:1.4">'+xe(item.title)+'</div>';
        h+='<div style="font-size:11px;color:#4a8aff;margin-top:6px">LEER MÁS ↗</div></div>';
      });
      cont.innerHTML=h;
    }).catch(function(){cont.innerHTML="";});
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  sv("bcu_sound",soundEnabled);
  closeMenu();
  openMenu();
}

function doLogout(){
  if(confirm(L("¿Cerrar sesión?","Logout?"))){
    localStorage.removeItem("bcu_gym");
    localStorage.removeItem("bcu_athlete");
    location.reload();
  }
}

var spFilter='all';
function filterSp(f){
  spFilter=f;
  var all=document.getElementById('spf-all'),mine=document.getElementById('spf-mine');
  if(all)all.style.background=f==='all'?'#FFD700':'#000';
  if(all)all.style.color=f==='all'?'#000':'#FFD700';
  if(mine)mine.style.background=f==='mine'?'#FFD700':'#000';
  if(mine)mine.style.color=f==='mine'?'#000':'#FFD700';
  renderSparring();
}
function renderSparring(){
  var cont=el("sp-list");if(!cont)return;
  var sc=el("sp-count");if(sc)sc.textContent=allPosts.length+" "+L("publicaciones","posts");
  if(!allPosts.length){
    cont.innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:12px">🥊</div><div style="font-size:16px;font-weight:800;color:#FFD700">'+L("Sin posts de sparring","No sparring posts")+'</div></div>';
    return;
  }
  var h="";
  var posts=spFilter==='mine'?allPosts.filter(function(p){return isOwner(p.gymId);}):allPosts;
  if(spFilter==='mine'&&!posts.length){
    cont.innerHTML='<div style="text-align:center;padding:30px 20px;color:#4a6a8a"><div style="font-size:36px;margin-bottom:8px">📋</div><div style="font-size:14px;font-weight:700;color:#FFD700">No tienes publicaciones aún</div><div style="font-size:12px;margin-top:4px">Toca + NUEVO para publicar</div></div>';
    return;
  }
  posts.forEach(function(p){
    var own=isOwner(p.gymId);
    var isNew=(Date.now()-p.createdAt)<300000; // new if < 5 min
    h+='<div class="card" style="margin-bottom:10px'+(own?";border-color:#FFD700":"")+(isNew?";border-left:3px solid #e74c3c":"")+'">'; 
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div><div style="font-size:15px;font-weight:800;color:#fff">'+xe(p.gymName)+(own?' <span class="mine-tag">✏️ TUYO</span>':'')+'</div>';
    h+='<div style="font-size:11px;color:#4a6a8a">'+xe(p.city||"")+(p.country&&p.country!=="USA"?" • "+xe(p.country):"")+" • "+ago(p.createdAt)+'</div></div>';
    h+='<div style="display:flex;align-items:center;gap:6px">'+(isNew?'<span class="new-badge">NEW</span>':'');
    h+='<div style="font-size:10px;color:#FFD700;font-weight:700;background:#000;padding:4px 8px;border-radius:8px">'+xe(p.date||"")+'</div></div></div>';
    if(p.athletes&&p.athletes.length){
      h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
      p.athletes.forEach(function(a){h+='<span style="background:#1a2d4a;border-radius:8px;padding:4px 8px;font-size:11px;color:#FFD700">'+xe(a.weight)+'lb '+(a.sex==="M"?"♂":"♀")+'</span>';});
      h+='</div>';
    }
    if(p.notes)h+='<div style="font-size:12px;color:#8a9aaa;margin-bottom:8px">'+xe(p.notes)+'</div>';

function loadUSAEvents(){
  var cont=el("usa-ev-list");if(!cont)return;
  var RSS="https://rss.app/feeds/IXCBLERcgy93hqDn.xml";
  fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(RSS))
    .then(function(r){return r.text();})
    .then(function(xml){
      var h="";
      var matches=xml.match(/<item>[\s\S]*?<\/item>/g)||[];
      matches.slice(0,5).forEach(function(item){
        var t=(item.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||item.match(/<title>(.*?)<\/title>/))||[];
        var l=(item.match(/<link>(.*?)<\/link>/))||[];
        var d=(item.match(/<pubDate>(.*?)<\/pubDate>/))||[];
        if(t[1]){
          h+='<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="window.open(\''+xe(l[1]||"#")+'\',\'_blank\')">';
          h+='<div style="font-size:10px;color:#FFD700;margin-bottom:4px">'+xe((d[1]||"").substr(0,16))+'</div>';
          h+='<div style="font-size:13px;font-weight:700;color:#fff">'+xe(t[1])+'</div>';
          h+='<div style="font-size:11px;color:#4a8aff;margin-top:4px">VER ↗</div></div>';
        }
      });
      if(cont)cont.innerHTML=h||'<div style="text-align:center;font-size:12px;color:#4a6a8a;padding:10px">Sin datos</div>';
    }).catch(function(){if(cont)cont.innerHTML='';});
}

    return;
  }
  var posts=feedFilter==="mine"?allFeedPosts.filter(function(p){return isOwner(p.gymId);}):allFeedPosts;
  var h="";
  var posts=feedFilter==='mine'?allFeedPosts.filter(function(p){return isOwner(p.gymId);}):allFeedPosts;
  if(feedFilter==='mine'&&!posts.length){
    cont.innerHTML='<div style="text-align:center;padding:30px 20px;color:#4a6a8a"><div style="font-size:36px;margin-bottom:8px">📸</div><div style="font-size:14px;font-weight:700;color:#FFD700">No tienes publicaciones aún</div></div>';
    return;
  }
  posts.forEach(function(p){
    var own=isOwner(p.gymId);
    var isNew=(Date.now()-p.createdAt)<300000;
    h+='<div class="post-card" style="margin-bottom:10px'+(isNew?";border-left:3px solid #e74c3c":"")+(own?";border-color:#FFD700":"")+'">';
    h+='<div style="display:flex;align-items:center;gap:10px;padding:12px">';
    h+='<div style="width:40px;height:40px;border-radius:10px;background:#1a2d4a;display:flex;align-items:center;justify-content:center;font-weight:900;color:#FFD700;flex-shrink:0">'+(p.gymName||"?").charAt(0).toUpperCase()+'</div>';
    h+='<div style="flex:1"><div style="font-weight:800;color:#fff;font-size:14px">'+xe(p.gymName)+(own?' <span class="mine-tag">✏️ TUYO</span>':'')+'</div>';
    h+='<div style="font-size:10px;color:#4a6a8a">'+ago(p.createdAt)+(p.country?" • "+xe(p.country):"")+'</div></div>';
    if(isNew)h+='<span class="new-badge">NEW</span>';
    h+='</div>';
    if(p.photo)h+='<img src="'+p.photo+'" style="width:100%;max-height:350px;object-fit:cover">';
    if(p.text)h+='<div style="padding:12px;font-size:14px;color:#ddd;line-height:1.5">'+xe(p.text)+'</div>';
    h+='<div style="display:flex;padding:6px 12px;border-top:1px solid #1a2d4a;gap:16px;align-items:center">';
    var liked=gym&&p.likes&&p.likes[gym.id];
    h+='<button onclick="toggleFeedLike(\''+xe(p.id)+'\')" style="background:none;border:none;cursor:pointer;color:'+(liked?"#e74c3c":"#4a6a8a")+';font-size:13px;font-weight:700">'+(liked?"❤️":"🤍")+" "+(p.likesCount||0)+'</button>';
    h+='<button onclick="showFeedComments(\''+xe(p.id)+'\')" style="background:none;border:none;cursor:pointer;color:#4a6a8a;font-size:13px;font-weight:700">💬 '+(p.commentCount||0)+'</button>';
    if(own){
      h+='<div style="margin-left:auto;display:flex;gap:6px">'
        +'<button class="btn-edit" onclick="editFeedPost(\''+p.id+'\')" style="padding:4px 10px;font-size:10px">✏️</button>'
        +'<button class="btn-del" onclick="deleteFeedPost(\''+p.id+'\')" style="padding:4px 10px;font-size:10px">🗑️</button>'
        +'</div>';
    }
    h+='</div></div>';
  });
  cont.innerHTML=h;
}

function deleteFeedPost(id){
  if(!confirm(L("¿Eliminar esta publicación?","Delete this post?")))return;
  fbRemove("communityPosts/"+id);
}

function editFeedPost(id){
  var p=allFeedPosts.find(function(x){return x.id===id;});if(!p)return;
  var h='<div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:14px">✏️ EDITAR PUBLICACIÓN</div>';
  h+='<textarea class="inp" id="efp-text" style="height:100px;resize:none;margin-bottom:14px">'+xe(p.text||"")+'</textarea>';
  h+='<button id="efp-save" class="btn-y" style="margin-bottom:8px">GUARDAR</button>';
  h+='<div id="efp-msg" style="text-align:center;font-size:12px;margin-top:8px"></div>';
  showM(h);
  el("efp-save").onclick=function(){
    var msg=el("efp-msg"),txt=el("efp-text");
    if(msg)msg.innerHTML='<span style="color:#FFD700">Guardando...</span>';
    fbUpdate("communityPosts/"+id,{text:txt?txt.value.trim():""},function(ok){
      if(ok)closeM();else if(msg)msg.innerHTML='<span style="color:#e74c3c">Error</span>';
    });
  };
}

function toggleFeedLike(postId){
  var user=gym||athlete;if(!user||!fdb)return;
  var ref=fdb.ref("communityPosts/"+postId);
  ref.once("value",function(s){
    var p=s.val();if(!p)return;
    var likes=p.likes||{},count=p.likesCount||0;
    if(likes[user.id]){delete likes[user.id];count=Math.max(0,count-1);}
    else{likes[user.id]=true;count++;}
    ref.update({likes:likes,likesCount:count});
  });
}

function showFeedComments(postId){
  if(!fdb)return;
  fdb.ref("communityPosts/"+postId+"/comments").once("value",function(s){
    var comments=[];s.forEach(function(c){comments.push(c.val());});
    var h='<div style="font-size:17px;font-weight:900;color:#FFD700;margin-bottom:14px">💬 '+L("Comentarios","Comments")+'</div>';
    if(!comments.length)h+='<div style="text-align:center;color:#4a6a8a;font-size:13px;padding:20px">Sin comentarios aún</div>';
    comments.forEach(function(cm){
      h+='<div style="background:#000;border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid #FFD700">';
      h+='<div style="font-weight:700;color:#FFD700;font-size:12px">'+xe(cm.gymName)+'</div>';
      h+='<div style="color:#ddd;font-size:13px;margin-top:4px">'+xe(cm.text)+'</div></div>';
    });
    var user=gym||athlete;
    if(user){
      h+='<textarea class="inp" id="nc-text" placeholder="Escribe un comentario..." style="height:70px;resize:none;margin-top:10px"></textarea>';
      h+='<button class="btn-y" style="margin-top:8px" onclick="submitFeedComment(\''+postId+'\')">COMENTAR</button>';
    }
    showM(h);
  });
}

function submitFeedComment(postId){
  var user=gym||athlete;if(!user||!fdb)return;
  var nc=el("nc-text");if(!nc||!nc.value.trim())return;
  var cm={gymId:user.id,gymName:gym?gym.name:(athlete?athlete.name:""),text:nc.value.trim(),createdAt:Date.now()};
  fdb.ref("communityPosts/"+postId+"/comments").push(cm);
  fdb.ref("communityPosts/"+postId).once("value",function(s){
    var cnt=(s.val()&&s.val().commentCount)||0;
    fdb.ref("communityPosts/"+postId).update({commentCount:cnt+1});
  });
  closeM();
}

el("new-post-btn")&&(el("new-post-btn").onclick=function(){
  var user=gym||athlete;if(!user){showM('<div style="font-size:16px;font-weight:900;color:#FFD700;margin-bottom:12px">Regístrate primero</div><button class="btn-y" onclick="closeM()">OK</button>');return;}
  var _photo=null;
  var h='<div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:14px">🌍 NUEVA PUBLICACIÓN</div>';
  h+='<div id="post-prev" style="width:100%;height:160px;background:#111;border-radius:12px;border:2px dashed #1a2d4a;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;font-size:36px;color:#3a4a5a">📷</div>';
  h+='<label style="display:block;background:#000;border:2px solid #FFD700;color:#FFD700;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:10px">📷 AGREGAR FOTO<input type="file" id="fp-inp" accept="image/*" style="display:none" capture="environment"></label>';
  h+='<textarea class="inp" id="fp-text" placeholder="¿Qué está pasando en tu gym?" style="height:80px;resize:none;margin-bottom:14px"></textarea>';
  h+='<button id="fp-submit" class="btn-y">PUBLICAR</button>';
  h+='<div id="fp-msg" style="text-align:center;font-size:12px;margin-top:8px"></div>';
  showM(h);
  setTimeout(function(){
    var inp=el("fp-inp");
    if(inp)inp.onchange=function(){
      var file=this.files[0];if(!file)return;
      var reader=new FileReader();
      reader.onload=function(e){
        var img=new Image();
        img.onload=function(){
          var canvas=document.createElement("canvas");
          var MAX=600,w=img.width,h2=img.height;
          if(w>h2){if(w>MAX){h2=h2*(MAX/w);w=MAX;}}else{if(h2>MAX){w=w*(MAX/h2);h2=MAX;}}
          canvas.width=w;canvas.height=h2;
          canvas.getContext("2d").drawImage(img,0,0,w,h2);
          _photo=canvas.toDataURL("image/jpeg",0.75);
          var prev=el("post-prev");
          if(prev)prev.innerHTML='<img src="'+_photo+'" style="width:100%;height:100%;object-fit:cover">';
        };img.src=e.target.result;
      };reader.readAsDataURL(file);
    };
    el("fp-submit").onclick=function(){
      var msg=el("fp-msg"),text=el("fp-text");
      if(!_photo&&(!text||!text.value.trim())){if(msg)msg.innerHTML='<span style="color:#e74c3c">Agrega foto o texto</span>';return;}
      if(msg)msg.innerHTML='<span style="color:#FFD700">Publicando...</span>';
      var post={gymId:user.id,gymName:gym?gym.name:(athlete?athlete.name:""),country:user.country||"USA",state:user.state||"",text:text?text.value.trim():"",photo:_photo||null,likesCount:0,commentCount:0,likes:{},createdAt:Date.now()};
      fbPush("communityPosts",post,function(ok){if(ok){_photo=null;closeM();}else if(msg)msg.innerHTML='<span style="color:#e74c3c">Error</span>';});
    };
  },100);
});

// ── TIMER ─────────────────────────────────────────────────────────────────
var TM={run:false,iv:null,sec:0,round:0,total:0,wSec:0,rSec:0,work:true};
function showTimer(){
  var h='<div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:14px">⏱️ CRONÓMETRO</div>';
  h+='<div style="text-align:center;margin-bottom:16px">';
  h+='<div id="tm-display" style="font-size:72px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums">3:00</div>';
  h+='<div id="tm-info" style="font-size:14px;color:#4a6a8a;margin-top:4px">Asalto 0 / 0</div></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  h+='<div><label class="lbl">MODO</label><select class="sel" id="tm-mode"><option value="3-1-12">Amateur (3min/1min)</option><option value="2-1-8">Sub-16 (2min/1min)</option><option value="4-1-12">Pro (4min/1min)</option></select></div>';
  h+='<div><label class="lbl">ASALTOS</label><input class="inp" type="number" id="tm-rounds" value="3" min="1" max="12"></div></div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  h+='<button id="tm-start" class="btn-y" style="flex:1">▶ INICIAR</button>';
  h+='<button id="tm-stop" class="btn-dark" style="flex:1">⏹ PARAR</button></div>';
  h+='<div id="tm-phase" style="text-align:center;font-size:18px;font-weight:900;color:#27ae60;min-height:26px">LISTO</div>';
  showM(h);
  function updateDisplay(){
    var m=Math.floor(TM.sec/60),s=TM.sec%60;
    var e=el("tm-display");if(e)e.textContent=m+":"+(s<10?"0":"")+s;
    var i=el("tm-info");if(i)i.textContent="Asalto "+TM.round+" / "+TM.total;
    var p=el("tm-phase");
    if(p)p.textContent=TM.work?"COMBATE":"DESCANSO";
    if(p)p.style.color=TM.work?"#e74c3c":"#27ae60";
    if(e)e.style.color=TM.sec<=10&&TM.work?"#e74c3c":"#fff";
  }
  el("tm-start").onclick=function(){
    if(TM.run)return;
    var mode=(el("tm-mode")||{}).value||"3-1-12";
    var parts=mode.split("-");
    TM.wSec=parseInt(parts[0])*60;TM.rSec=parseInt(parts[1])*60;
    TM.total=parseInt(el("tm-rounds").value)||3;
    TM.round=1;TM.work=true;TM.sec=TM.wSec;TM.run=true;
    playBell(2);updateDisplay();
    TM.iv=setInterval(function(){
      TM.sec--;
      if(TM.sec<=0){
        if(TM.work){
          if(TM.round>=TM.total){clearInterval(TM.iv);TM.run=false;TM.sec=0;playBell(3);updateDisplay();var p=el("tm-phase");if(p){p.textContent="FIN";p.style.color="#FFD700";}return;}
          TM.work=false;TM.sec=TM.rSec;playBell(1);
        }else{TM.round++;TM.work=true;TM.sec=TM.wSec;playBell(2);}
      }
      updateDisplay();
    },1000);
  };
  el("tm-stop").onclick=function(){clearInterval(TM.iv);TM.run=false;TM.sec=0;TM.round=0;updateDisplay();var p=el("tm-phase");if(p){p.textContent="LISTO";p.style.color="#27ae60";}};
}
