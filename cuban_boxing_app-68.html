if('serviceWorker' in navigator) {

      console.log('SW failed:', e);

}

// Service Worker — only on real hosting (not preview)
if('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js')
      .then(function(r){ console.log('SW ✅'); })
      .catch(function(e){ console.log('SW skip'); });
  });
}
// PWA install prompt
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after 3 seconds if not already installed
  setTimeout(function() {
    if(deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      showInstallBanner();
    }
  }, 3000);
  // Also show for iOS (no beforeinstallprompt on iOS)
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if(isIOS && !isStandalone) {
    setTimeout(showInstallBanner, 4000);
  }
});
function showInstallBanner() {
  if(document.getElementById('pwa-banner')) return;
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(isStandalone) return; // already installed
  var banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = 'position:fixed;bottom:70px;left:10px;right:10px;background:linear-gradient(135deg,#D4A017,#f0c040);color:#070d1a;padding:12px 14px;border-radius:14px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);font-family:sans-serif';
  if(isIOS) {
    banner.innerHTML = '<span style="font-size:24px">📲</span><div style="flex:1"><div style="font-weight:900;font-size:13px">INSTALAR EN iPHONE</div><div style="font-size:11px">Toca <strong>⬆️ Compartir</strong> → <strong>Agregar a inicio</strong></div></div><button onclick="this.parentElement.remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#070d1a">✕</button>';
  } else {
    banner.innerHTML = '<span style="font-size:24px">📲</span><div style="flex:1"><div style="font-weight:900;font-size:13px">INSTALAR CBA BOXING</div><div style="font-size:11px;opacity:.8">Agregar a pantalla de inicio</div></div><button onclick="installPWA()" style="background:#070d1a;color:#D4A017;border:none;border-radius:8px;padding:8px 12px;font-weight:900;font-size:12px;cursor:pointer">INSTALAR</button><button onclick="this.parentElement.remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#070d1a">✕</button>';
  }
  document.body.appendChild(banner);
}
function installPWA() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) {
    deferredPrompt = null;
    var b = document.getElementById('pwa-banner');
    if(b) b.remove();
  });
}
</script>

function getSessData(phase, week, dow, group) {
const di = dow===0?6:dow-1;
if(di>=5) return {title:L("Descanso Completo","Full Rest"),blocks:[],el:"",ri:"",pct:0,pc:"#1e3050",type:"rest"};
const is90 = !(group&&(group.includes("C")||group.includes("Grupo C")||group.includes("Group C")||group.includes("B")||group.includes("Grupo B")||group.includes("Group B")));
let result;
if(phase===1) result = p1Session(week,dow,is90);
else if(phase===2) result = p2Session(week,dow,is90);
else if(phase===3) result = p3Session(week,dow,is90);
else if(phase===4) result = p4Session(week,dow,is90);
else result = null;
if(!result) return {title:L("Descanso Activo","Active Rest"),blocks:[],el:L("Mantenimiento","Maintenance"),ri:"",pct:70,pc:PC[5]||"#4a4a1a",type:"rest"};
result.dur = result.blocks.reduce((s,b)=>s+(parseInt(b.t)||0),0);
return result;
}

function marcarEntrenoPro(dia) {
  if (!ST.proUser) return;
  let progreso;
  try { progreso = JSON.parse(localStorage.getItem("pro_progress_" + ST.proUser.id)) || { completados: [] }; }
  catch(e) { progreso = { completados: [] }; }
  if (!progreso.completados.includes(dia)) {
    progreso.completados.push(dia);
    localStorage.setItem("pro_progress_" + ST.proUser.id, JSON.stringify(progreso));
    const phrases = ["💪 ¡Sesión completada!","🔥 Un día más hacia el título","🥊 El trabajo no miente","⭐ Excelente sesión","🇨🇺🇺🇸🇲🇽 Sistema en acción"];
    const toast = document.createElement("div");
    toast.textContent = phrases[Math.floor(Math.random()*phrases.length)];
    toast.style.cssText = "position:fixed;bottom:70px;left:20px;right:20px;background:#D4A017;color:#070d1a;padding:12px;border-radius:12px;font-weight:900;z-index:200;text-align:center;font-size:13px;";
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 3000);
  }
  const container = document.getElementById("proContent");
  if (container) container.innerHTML = renderProWeeklyPlan();
}

function restoreSession(sess){
  if(!sess){showLogin();return;}
  if(sess.isCoach){
    ST.isCoach=true;ST.user=null;ST.isParent=false;ST.parentUser=null;ST.proUser=null;
    launchApp();
  } else if(sess.isParent&&sess.userId){
    const ath=ST.athletes.find(a=>a.id===sess.userId);
    if(ath){ST.isCoach=false;ST.user=null;ST.isParent=true;ST.parentUser=ath;ST.proUser=null;launchApp();}
    else showLogin();
  } else if(sess.userId){
    const ath=ST.athletes.find(a=>a.id===sess.userId);
    if(ath){ST.isCoach=false;ST.user=ath;ST.isParent=false;ST.parentUser=null;ST.proUser=null;launchApp();}
    else showLogin();
  } else {showLogin();}
}
function init(){
ST.lang=ld("cba_lang","es")||"es";
const sess=ld("cba_session",null);

// Load from Firebase if available, else localStorage
if(cfdb){
  // Athletes — real-time listener
  cfdb.ref("cba_athletes").on("value", function(snap){
    var fbAthletes = [];
    snap.forEach(function(ch){ var v=ch.val(); v.id=ch.key; fbAthletes.push(v); });
    if(fbAthletes.length > 0){
      // Sync PINs from defaults
      fbAthletes = fbAthletes.map(function(ath){
        var def = DA.find(function(d){ return d.id===ath.id; });
        if(def && (!ath.pin || ath.pin==="1234")) return Object.assign({},ath,{pin:def.pin});
        return ath;
      });
      ST.athletes = fbAthletes;
    } else {
      // First time — push default athletes to Firebase
      ST.athletes = DA;
      DA.forEach(function(ath){ cfdb.ref("cba_athletes/"+ath.id).set(ath); });
    }
    sv("cba_athletes", ST.athletes);
    if(!window._sessionRestored){ window._sessionRestored=true; restoreSession(sess); }
    else { reRender(); }
  });
  // Fights — real-time listener
  cfdb.ref("cba_fights").on("value", function(snap){
    var fbFights = [];
    snap.forEach(function(ch){ var v=ch.val(); v.id=ch.key; fbFights.push(v); });
    if(fbFights.length > 0){
      ST.fights = fbFights;
    } else {
      ST.fights = DF;
      DF.forEach(function(f){ cfdb.ref("cba_fights/"+f.id).set(f); });
    }
    sv("cba_fights", ST.fights);
    reRender();
  });
} else {
  // Fallback to localStorage
  const a=ld("cba_athletes",[]);
  const f=ld("cba_fights",[]);
  ST.fights=f.length>0?f:DF;
  if(f.length===0)sv("cba_fights",DF);
  if(a.length>0){
    ST.athletes=a.map(function(ath){
      var def=DA.find(function(d){return d.id===ath.id;});
      if(def&&(!ath.pin||ath.pin==="1234")) return Object.assign({},ath,{pin:def.pin});
      return ath;
    });
    sv("cba_athletes",ST.athletes);
  } else {
    ST.athletes=DA;
    sv("cba_athletes",DA);
  }
  // Restore session from localStorage
  const _sess2 = ld("cba_session",null);
  restoreSession(_sess2);
}
var curSession = true;
}
window.addEventListener("DOMContentLoaded",init);

  _fatigas.forEach(f => {

function guardarReporte() {
  const peso = document.getElementById("rep-peso")?.value;
  const sueno = document.getElementById("rep-sueno")?.value;
  const notas = document.getElementById("rep-notas")?.value || "";
  const msg = document.getElementById("rep-msg");

  if (!peso || !sueno) {
    if (msg) msg.innerHTML = '<span style="color:#e74c3c">Ingresa peso y horas de sueño</span>';
    return;
  }

  const fecha = new Date().toISOString().split("T")[0];
  const datos = {
    peso: parseFloat(peso),
    sueno: parseInt(sueno),
    fatiga: window._fatSel,
    notas: notas.trim(),
    fecha,
    atleta: ST.user ? ST.user.name : "Coach",
    ts: Date.now()
  };

  sv("cba_reporte_" + fecha, datos);

  // Save to history
  const hist = ld("cba_reportes_hist", []);
  hist.push(datos);
  if (hist.length > 30) hist.shift();
  sv("cba_reportes_hist", hist);

  if (msg) msg.innerHTML = '<span style="color:#1a8f4c">✅ Reporte guardado correctamente</span>';
}

function evaluarSemaforo() {
  const objetivo = parseFloat(document.getElementById("sem-objetivo")?.value);
  const actual = parseFloat(document.getElementById("sem-actual")?.value);
  const res = document.getElementById("semaforo-resultado");

  if (!actual || isNaN(actual)) {
    alert("Ingresa tu peso actual");
    return;
  }

  const dif = actual - objetivo;
  res.style.display = "block";

  if (dif >= -2 && dif <= 2) {
    res.style.background = "#1a4a00";
    res.style.border = "2px solid #27ae60";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🟢</div>
      <div style="font-size:18px;font-weight:900;color:#27ae60">EN CATEGORÍA</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">${actual} lbs · objetivo: ${objetivo} lbs</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">¡Excelente! Mantén la dieta y la intensidad. Listo para la báscula.</div>`;
  } else if (dif > 2 && dif <= 6) {
    res.style.background = "#2a2000";
    res.style.border = "2px solid #D4A017";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🟡</div>
      <div style="font-size:18px;font-weight:900;color:#D4A017">ALERTA DE PESO</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">+${dif.toFixed(1)} lbs sobre el objetivo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">Ajusta cardio al final de la sesión y cuida el consumo de agua y sodio.</div>`;
  } else if (dif > 6) {
    res.style.background = "#2a0000";
    res.style.border = "2px solid #e74c3c";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🔴</div>
      <div style="font-size:18px;font-weight:900;color:#e74c3c">FUERA DE CATEGORÍA</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">+${dif.toFixed(1)} lbs sobre el objetivo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">¡Alerta! Doble sesión cardio, sin sodio ni azúcar. Revisar plan alimentario con el Coach.</div>`;
  } else {
    res.style.background = "#0a1628";
    res.style.border = "2px solid #4a8aff";
    res.innerHTML = `<div style="font-size:32px;margin-bottom:8px">🔵</div>
      <div style="font-size:18px;font-weight:900;color:#4a8aff">DEBAJO DEL OBJETIVO</div>
      <div style="font-size:14px;color:#fff;margin-top:4px">${Math.abs(dif).toFixed(1)} lbs por debajo</div>
      <div style="font-size:12px;color:#ccc;font-family:Barlow;margin-top:8px">Revisa niveles de energía y carga carbohidratos limpios. Consulta al Coach.</div>`;
  }
}

function suiteTab(tab) {
  ["disp","spar","rival"].forEach(t => {
    const btn = document.getElementById("stab-" + t);
    if (btn) {
      btn.style.background = t === tab ? (t==="disp"?"#1a4a7a":t==="spar"?"#1a6b3c":"#5b2c8d") : "#0f1e35";
      btn.style.color = t === tab ? "#fff" : "#4a6a8a";
    }
  });
  const cont = document.getElementById("suite-content");
  if (cont) cont.innerHTML = suiteTabContent(tab);
}

function guardarSparringLog() {
  const rival = document.getElementById("spar-rival")?.value;
  const positivo = document.getElementById("spar-positivo")?.value;
  const error = document.getElementById("spar-error")?.value;
  const msg = document.getElementById("msj-spar");

  if (!rival || !rival.trim()) {
    if (msg) msg.innerHTML = '<span style="color:#e74c3c">Ingresa con quién hiciste sparring</span>';
    return;
  }

  const entrada = {
    fecha: new Date().toLocaleDateString("es-US"),
    rival: rival.trim(),
    positivo: (positivo||"").trim(),
    error: (error||"").trim(),
    atleta: ST.user ? ST.user.name : "Coach",
    ts: Date.now()
  };

  const hist = ld("cba_sparring_log", []);
  hist.push(entrada);
  if (hist.length > 50) hist.shift();
  sv("cba_sparring_log", hist);

  if (msg) msg.innerHTML = '<span style="color:#27ae60">✅ ¡Bitácora guardada! Buen trabajo campeón.</span>';

  // Clear inputs
  setTimeout(() => {
    ["spar-rival","spar-positivo","spar-error"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = "";
    });
  }, 1500);

  // Send to WhatsApp if athlete
  if (ST.user && positivo) {
    const waMsg = encodeURIComponent(`🥊 BITÁCORA SPARRING - ${ST.user.name}\n📅 ${entrada.fecha}\nRounds: ${rival}\n✅ Funcionó: ${positivo}\n⚠️ Error: ${error||"N/A"}`);
    setTimeout(() => {
      if (confirm("¿Enviar reporte al Coach por WhatsApp?")) {
        window.open("https://wa.me/17027234009?text=" + waMsg, "_blank");
      }
    }, 500);
  }
}

window._wData = {train:0,nut:"",fam:"",emot:"",coachRating:0,coachComment:""};

function wStar(field,val){
  window._wData[field] = val;
  wStarVis(field, val);
}

function wStarVis(field, val){
  const prefix = field==="train"?"wts":"wcr";
  const emoji = field==="train"?["😔","😐","🙂","😊","🔥"]:["⭐","⭐","⭐","⭐","⭐"];
  for(let i=1;i<=5;i++){
    const btn = document.getElementById(prefix+i);
    if(btn) btn.style.background = i<=val?"#D4A017":"#1e3050";
  }
}

function wOpt(field, val){
  window._wData[field] = val;
  const colors = {nut:"#1a6b3c", fam:"#1a4a7a"};
  const prefixes = {nut:["si","regular","no"], fam:["mucho","regular","poco"]};
  prefixes[field].forEach(opt=>{
    const btn = document.getElementById("w"+field+opt);
    if(btn) btn.style.background = opt===val?colors[field]:"#0f1e35";
  });
}

function wOptVis(field, val, color){
  const prefixes = {nut:["si","regular","no"], fam:["mucho","regular","poco"]};
  prefixes[field].forEach(opt=>{
    const btn = document.getElementById("w"+field+opt);
    if(btn) btn.style.background = opt===val?color:"#0f1e35";
  });
}

function getCoachResponse(msg) {
  const m = msg.toLowerCase();
  let pool;
  if(m.includes("cansad") || m.includes("tired") || m.includes("agotad") || m.includes("exhausted") || m.includes("no tengo energia") || m.includes("no energy")) pool = COACH_RESPONSES.cansado;
  else if(m.includes("nervios") || m.includes("nervous") || m.includes("miedo") || m.includes("afraid") || m.includes("scared") || m.includes("asustado") || m.includes("ansiedad") || m.includes("anxiety")) pool = COACH_RESPONSES.nervioso;
  else if(m.includes("rendir") || m.includes("quit") || m.includes("dejar") || m.includes("give up") || m.includes("parar") || m.includes("ya no quiero") || m.includes("dont want") || m.includes("no quiero")) pool = COACH_RESPONSES.rendirse;
  else if(m.includes("amigo") || m.includes("friend") || m.includes("compañero") || m.includes("classmate") || m.includes("escuela") || m.includes("school") || m.includes("compañeros") || m.includes("nobody understands") || m.includes("nadie entiende")) pool = COACH_RESPONSES.amigos;
  else if(m.includes("famili") || m.includes("mamá") || m.includes("papá") || m.includes("mom") || m.includes("dad") || m.includes("parent") || m.includes("hermano") || m.includes("brother") || m.includes("sister") || m.includes("hermana") || m.includes("casa") || m.includes("home")) pool = COACH_RESPONSES.familia;
  else if(m.includes("pelea") || m.includes("fight") || m.includes("mañana peleo") || m.includes("fighting tomorrow") || m.includes("torneo") || m.includes("tournament") || m.includes("competencia") || m.includes("competition")) pool = COACH_RESPONSES.pelea;
  else if(m.includes("dolor") || m.includes("pain") || m.includes("duele") || m.includes("hurt") || m.includes("lesion") || m.includes("injury") || m.includes("me lastimé") || m.includes("i hurt")) pool = COACH_RESPONSES.dolor;
  else if(m.includes("estudi") || m.includes("study") || m.includes("examen") || m.includes("exam") || m.includes("clase") || m.includes("class") || m.includes("tarea") || m.includes("homework")) pool = COACH_RESPONSES.estudio;
  else {
    const d = COACH_RESPONSES.default;
    const pick = d[Math.floor(Math.random()*d.length)];
    return {es: pick.es, en: pick.en};
  }
  // Pick random from pool
  const idx = Math.floor(Math.random() * pool.es.length);
  return {es: pool.es[idx], en: pool.en[idx]};
}
function getCoachResponse(msg) {
  const m = msg.toLowerCase();
  if(m.includes("cansad") || m.includes("tired") || m.includes("agotad") || m.includes("exhausted")) return COACH_RESPONSES.cansado;
  if(m.includes("nervios") || m.includes("nervous") || m.includes("miedo") || m.includes("afraid") || m.includes("scared")) return COACH_RESPONSES.nervioso;
  if(m.includes("rendir") || m.includes("quit") || m.includes("dejar") || m.includes("give up") || m.includes("parar")) return COACH_RESPONSES.rendirse;
  if(m.includes("amigo") || m.includes("friend") || m.includes("compañero") || m.includes("classmate")) return COACH_RESPONSES.amigos;
  if(m.includes("famili") || m.includes("mamá") || m.includes("papá") || m.includes("mom") || m.includes("dad") || m.includes("parent")) return COACH_RESPONSES.familia;
  if(m.includes("pelea") || m.includes("fight") || m.includes("compet") || m.includes("torneo") || m.includes("tournament")) return COACH_RESPONSES.pelea;
  if(m.includes("dolor") || m.includes("pain") || m.includes("duele") || m.includes("hurt") || m.includes("lesion") || m.includes("injury")) return COACH_RESPONSES.dolor;
  return COACH_RESPONSES.default;
}

function renderPsychChat() {
  const msgs = ld("cba_coach_chat", []);
  let h = `<div style="background:#0a1628;border-radius:10px;padding:10px;margin-bottom:10px;text-align:center">
    <div style="font-size:11px;color:#D4A017;font-weight:700">${L("Coach Osvimer Rodriguez","Coach Osvimer Rodriguez")}</div>
    <div style="font-size:10px;color:#7a9ab5;font-family:Barlow">${L("Te respondo en segundos · Todo es privado","I'll respond in seconds · Everything is private")}</div>
  </div>`;

  // Chat messages
  h += `<div id="chat-msgs" style="min-height:120px;margin-bottom:10px">`;
  if(!msgs.length) {
    h += `<div style="text-align:center;padding:20px;color:#4a6a8a;font-size:12px;font-family:Barlow">${L("¿Cómo te sientes hoy? Cuéntame.","How are you feeling today? Tell me.")}</div>`;
  } else {
    msgs.slice(-10).forEach(m => {
      if(m.role === "athlete") {
        h += `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
          <div style="background:#1a4a7a;border-radius:12px 12px 0 12px;padding:10px 12px;max-width:80%">
            <div style="font-size:12px;color:#fff;font-family:Barlow">${esc(m.text)}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.5);margin-top:4px;text-align:right">${m.time||""}</div>
          </div></div>`;
      } else {
        h += `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:#D4A017;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">👨‍💼</div>
          <div style="background:#0f1e35;border-radius:0 12px 12px 12px;padding:10px 12px;max-width:80%">
            <div style="font-size:10px;color:#D4A017;font-weight:700;margin-bottom:4px">Coach Osvimer</div>
            <div style="font-size:12px;color:#fff;font-family:Barlow;line-height:1.6">${esc(m.text)}</div>
            <div style="font-size:9px;color:#4a6a8a;margin-top:4px">${m.time||""}</div>
          </div></div>`;
      }
    });
  }
  h += `<div id="typing-indicator" style="display:none;align-items:center;gap:8px;margin-bottom:8px">
    <div style="width:32px;height:32px;border-radius:50%;background:#D4A017;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">👨‍💼</div>
    <div style="background:#0f1e35;border-radius:0 12px 12px 12px;padding:10px 12px">
      <div style="font-size:10px;color:#D4A017;font-weight:700;margin-bottom:4px">Coach Osvimer</div>
      <div style="display:flex;gap:4px;align-items:center">
        <div class="typing-dot" style="width:8px;height:8px;border-radius:50%;background:#D4A017;animation:typingPulse .8s infinite"></div>
        <div class="typing-dot" style="width:8px;height:8px;border-radius:50%;background:#D4A017;animation:typingPulse .8s .2s infinite"></div>
        <div class="typing-dot" style="width:8px;height:8px;border-radius:50%;background:#D4A017;animation:typingPulse .8s .4s infinite"></div>
        <span style="font-size:10px;color:#7a9ab5;margin-left:4px;font-family:Barlow">${L("Coach escribiendo...","Coach typing...")}</span>
      </div>
    </div>
  </div>`;
  h += `</div>`;

  // Input
  h += `<div style="display:flex;gap:8px;align-items:flex-end">
    <textarea class="inp" id="chat-input" rows="2" style="resize:none;flex:1;font-size:13px" placeholder="${L("Cuéntame cómo te sientes...","Tell me how you feel...")}"></textarea>
    <button onclick="sendCoachMsg()" style="background:#D4A017;border:none;color:#070d1a;border-radius:10px;padding:12px 14px;font-weight:900;font-size:16px;cursor:pointer;flex-shrink:0">➤</button>
  </div>
  <button onclick="clearCoachChat()" style="background:none;border:none;color:#4a6a8a;font-size:10px;font-family:Barlow;cursor:pointer;margin-top:6px;width:100%">${L("Borrar conversación","Clear conversation")}</button>`;

  return h;
}

// Add CSS for typing animation
(function(){
  if(document.getElementById("psych-style")) return;
  const s = document.createElement("style");
  s.id = "psych-style";
  s.textContent = "@keyframes typingPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}";
  document.head.appendChild(s);
})();

function sendCoachMsg() {
  const inp = document.getElementById("chat-input");
  if(!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = "";

  const now = new Date();
  const time = now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();

  // Save athlete message
  const msgs = ld("cba_coach_chat", []);
  msgs.push({role:"athlete", text, time});
  sv("cba_coach_chat", msgs);

  // Show athlete message and typing indicator
  const cont = document.getElementById("psych-content");
  if(cont) cont.innerHTML = renderPsychChat();
  psychTab("coach");

  // Show typing indicator
  setTimeout(() => {
    const ti = document.getElementById("typing-indicator");
    if(ti) ti.style.display = "flex";
    // Scroll to bottom
    const chatMsgs = document.getElementById("chat-msgs");
    if(chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }, 100);

  // Respond after 4-6 seconds (random to feel human)
  const delay = 4000 + Math.random() * 2000;
  setTimeout(() => {
    const resp = getCoachResponse(text);
    const respText = resp[ST.lang==="es"?"es":"en"];
    const nowResp = new Date();
    const timeResp = nowResp.getHours()+":"+(nowResp.getMinutes()<10?"0":"")+nowResp.getMinutes();
    const msgs2 = ld("cba_coach_chat", []);
    msgs2.push({role:"coach", text: respText, time: timeResp});
    sv("cba_coach_chat", msgs2);
    if(cont) cont.innerHTML = renderPsychChat();
    psychTab("coach");
    const chatMsgs2 = document.getElementById("chat-msgs");
    if(chatMsgs2) chatMsgs2.scrollTop = chatMsgs2.scrollHeight;
  }, delay);
}

function clearCoachChat() {
  sv("cba_coach_chat", []);
  const cont = document.getElementById("psych-content");
  if(cont) cont.innerHTML = renderPsychChat();
  psychTab("coach");
}

} catch(e) { window.onerror(e.message,'runtime',0,0,e); }</script>
